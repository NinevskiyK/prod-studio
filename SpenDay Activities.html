<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SpenDay — Активности</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="image-slot.js"></script>
<style>
  :root {
    --indigo: #4F46E5;
    --lavender: #818CF8;
    --bg: #FFFFFF;
    --card-bg: #F8F8FB;
    --ink: #1E1B4B;
    --muted: #6B7280;
    --pink: #EC4899;
    --green: #10B981;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }

  html, body {
    height: 100%;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background: #E9E9F0;
    padding: 24px;
  }

  .screen {
    position: relative;
    width: 375px;
    height: 812px;
    background: var(--bg);
    border-radius: 44px;
    overflow: hidden;
    box-shadow: 0 30px 80px -20px rgba(30, 27, 75, 0.35), 0 0 0 11px #111118, 0 0 0 13px #2a2a35;
    display: flex;
    flex-direction: column;
  }

  /* ---------- Status bar ---------- */
  .statusbar {
    flex: 0 0 auto;
    height: 54px;
    padding: 18px 30px 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 15px;
    font-weight: 600;
    color: var(--ink);
    z-index: 10;
  }
  .statusbar .icons { display: flex; align-items: center; gap: 7px; }
  .statusbar svg { display: block; }

  /* ---------- Header ---------- */
  .header {
    flex: 0 0 auto;
    padding: 6px 20px 16px;
    background: var(--bg);
    z-index: 6;
  }
  .header-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }
  .header-row h1 {
    font-size: 26px;
    font-weight: 800;
    color: var(--ink);
    letter-spacing: -0.02em;
  }
  .new-folder-btn {
    width: 38px;
    height: 38px;
    border-radius: 12px;
    background: var(--indigo);
    border: none;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    box-shadow: 0 6px 16px -4px rgba(79, 70, 229, 0.5);
  }

  /* ---------- Folder tabs ---------- */
  .folder-tabs {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    scrollbar-width: none;
    padding-bottom: 2px;
  }
  .folder-tabs::-webkit-scrollbar { display: none; }
  .ftab {
    flex: 0 0 auto;
    height: 36px;
    padding: 0 16px;
    border-radius: 18px;
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 14px;
    font-weight: 600;
    color: var(--muted);
    background: var(--card-bg);
    border: 1px solid #EFEFF6;
    white-space: nowrap;
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .ftab.active {
    background: var(--indigo);
    color: #fff;
    border-color: var(--indigo);
    box-shadow: 0 6px 14px -4px rgba(79, 70, 229, 0.5);
  }
  .ftab .count {
    font-size: 11px;
    font-weight: 700;
    background: rgba(255,255,255,0.25);
    padding: 1px 6px;
    border-radius: 8px;
  }
  .ftab:not(.active) .count {
    background: #E5E7F2;
    color: var(--muted);
  }

  /* ---------- Scroll ---------- */
  .scroll {
    flex: 1 1 auto;
    overflow-y: auto;
    scrollbar-width: none;
    -webkit-overflow-scrolling: touch;
    padding: 0 20px 20px;
  }
  .scroll::-webkit-scrollbar { display: none; }

  /* ---------- Folder grid ---------- */
  .folders {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    padding-top: 4px;
  }

  .folder {
    background: #fff;
    border: 1px solid #F1F1F8;
    border-radius: 18px;
    overflow: hidden;
    box-shadow: 0 6px 20px -8px rgba(30, 27, 75, 0.1);
    cursor: pointer;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }
  .folder:active {
    transform: scale(0.97);
    box-shadow: 0 4px 12px -6px rgba(30, 27, 75, 0.15);
  }

  /* Folder cover with stacked photos */
  .folder-cover {
    position: relative;
    height: 110px;
    overflow: hidden;
  }
  .folder-cover image-slot {
    width: 100%;
    height: 100%;
    display: block;
  }
  .folder-cover .stacked {
    position: absolute;
    inset: 0;
    display: flex;
  }
  .folder-cover .stacked .stack-img {
    flex: 1;
    height: 100%;
    position: relative;
  }
  .folder-cover .stacked .stack-img image-slot {
    width: 100%;
    height: 100%;
    display: block;
  }
  .folder-cover .stacked .stack-img + .stack-img {
    border-left: 2px solid #fff;
  }
  .folder-cover .cover-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, transparent 40%, rgba(0,0,0,0.35));
  }
  .folder-cover .share-btn {
    position: absolute;
    top: 8px;
    right: 8px;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: rgba(255,255,255,0.9);
    backdrop-filter: blur(4px);
    border: none;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    z-index: 3;
    box-shadow: 0 2px 6px rgba(30,27,75,0.15);
    transition: transform 0.12s ease;
  }
  .folder-cover .share-btn:active { transform: scale(0.9); }

  .folder-info {
    padding: 12px 14px 14px;
  }
  .folder-name {
    font-size: 14px;
    font-weight: 700;
    color: var(--ink);
    margin-bottom: 4px;
  }
  .folder-meta {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .folder-count {
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
  }
  .folder-avatars {
    display: flex;
    align-items: center;
    margin-left: auto;
  }
  .folder-avatars .mini-ava {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    border: 1.5px solid #fff;
    margin-left: -5px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 8px;
    font-weight: 700;
    color: #fff;
  }
  .folder-avatars .mini-ava:first-child { margin-left: 0; }

  /* ---------- Expanded folder view ---------- */
  .folder-expanded {
    display: none;
    margin-top: 4px;
  }
  .folder-expanded.show { display: block; }

  .expanded-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 0 12px;
  }
  .expanded-title {
    font-size: 20px;
    font-weight: 800;
    color: var(--ink);
    letter-spacing: -0.02em;
  }
  .expanded-actions {
    display: flex;
    gap: 8px;
  }
  .exp-btn {
    height: 36px;
    padding: 0 14px;
    border-radius: 12px;
    border: none;
    font-family: inherit;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: all 0.12s ease;
  }
  .exp-btn:active { transform: scale(0.96); }
  .exp-btn.primary {
    background: var(--indigo);
    color: #fff;
    box-shadow: 0 6px 16px -4px rgba(79, 70, 229, 0.45);
  }
  .exp-btn.ghost {
    background: var(--card-bg);
    color: var(--muted);
    border: 1px solid #EFEFF6;
  }

  .back-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 14px;
    font-weight: 600;
    color: var(--indigo);
    cursor: pointer;
    margin-bottom: 4px;
    padding: 4px 0;
  }

  /* Saved cards list */
  .saved-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .saved-card {
    display: flex;
    align-items: center;
    gap: 12px;
    background: #fff;
    border: 1px solid #F1F1F8;
    border-radius: 14px;
    padding: 10px 12px;
    box-shadow: 0 4px 14px -6px rgba(30,27,75,0.1);
  }
  .saved-thumb {
    width: 56px;
    height: 56px;
    border-radius: 10px;
    overflow: hidden;
    flex-shrink: 0;
  }
  .saved-thumb image-slot {
    width: 100%;
    height: 100%;
    display: block;
  }
  .saved-info {
    flex: 1;
    min-width: 0;
  }
  .saved-name {
    font-size: 14px;
    font-weight: 600;
    color: var(--ink);
    margin-bottom: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .saved-detail {
    font-size: 12px;
    font-weight: 500;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .saved-detail .dot { width: 3px; height: 3px; border-radius: 50%; background: #CBD0DA; }
  .saved-remove {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: var(--card-bg);
    border: none;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
  }

  /* ---------- Bottom nav ---------- */
  .bottomnav {
    flex: 0 0 auto;
    height: 86px;
    padding: 10px 24px 26px;
    background: rgba(255, 255, 255, 0.94);
    backdrop-filter: blur(20px);
    border-top: 1px solid #F1F1F8;
    display: flex;
    align-items: flex-start;
    justify-content: space-around;
    z-index: 8;
  }
  .navtab {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
    cursor: pointer;
    color: #B6BAC6;
    font-size: 11px;
    font-weight: 600;
    flex: 1;
    padding-top: 6px;
  }
  .navtab.active { color: var(--indigo); }

  .home-indicator {
    position: absolute;
    bottom: 8px;
    left: 50%;
    transform: translateX(-50%);
    width: 134px;
    height: 5px;
    border-radius: 3px;
    background: var(--ink);
    opacity: 0.85;
    z-index: 20;
  }
</style>
</head>
<body>
  <div class="screen" data-screen-label="Активности / Activities">

    <!-- Status bar -->
    <div class="statusbar">
      <span>9:41</span>
      <div class="icons">

        <svg width="17" height="12" viewBox="0 0 17 12" fill="none"><path d="M8.5 2.2c2.5 0 4.8 1 6.5 2.6l1.3-1.4C14.2 1.4 11.5.2 8.5.2S2.8 1.4.7 3.4L2 4.8C3.7 3.2 6 2.2 8.5 2.2z" fill="#1E1B4B"/><path d="M8.5 5.6c1.5 0 2.9.6 3.9 1.6l1.3-1.4c-1.4-1.3-3.2-2.1-5.2-2.1s-3.8.8-5.2 2.1L4.6 7.2c1-1 2.4-1.6 3.9-1.6z" fill="#1E1B4B"/><path d="M8.5 9c.7 0 1.3.3 1.8.7l-1.8 2-1.8-2c.5-.4 1.1-.7 1.8-.7z" fill="#1E1B4B"/></svg>

    <!-- Bottom nav -->

      <div class="navtab active">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><circle cx="9" cy="8" r="3" stroke="currentColor" stroke-width="1.8"/><circle cx="16.5" cy="9" r="2.4" stroke="currentColor" stroke-width="1.8"/><path d="M3.5 19c0-2.8 2.4-4.5 5.5-4.5s5.5 1.7 5.5 4.5M15 14.7c2.6.1 5.5 1.4 5.5 4.3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
        <span>Активности</span>
      </div>
      <div class="navtab">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><rect x="4.5" y="2.5" width="15" height="19" rx="2.5" stroke="currentColor" stroke-width="1.8"/><path d="M8 6.5h8M8 10h2.5M8 13.5h2.5M8 17h2.5M13.5 10h2.5M13.5 13.5h2.5M13.5 17h2.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
        <span>Калькулятор</span>
      </div>
      <div class="navtab">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="8" r="3.4" stroke="currentColor" stroke-width="1.8"/><path d="M5 19.5c0-3.3 3.1-5.5 7-5.5s7 2.2 7 5.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
        <span>Профиль</span>
      </div>
    </div>

    <div class="home-indicator"></div>
  </div>

  <script>
    // Folder data
    const folderData = {
      date: {
        name: 'Свидание',
        items: [
          { name: 'Романтический вечер в центре', detail: '3 места · 4–5 ч', price: 'от 4 200 ₽', img: 'https://images.unsplash.com/photo-1542557497-4c7b03d0d245?w=200&q=60' },
          { name: 'Ужин при свечах у моря', detail: '2 места · 3 ч', price: 'от 3 800 ₽', img: 'https://images.unsplash.com/photo-1514933651103-005eec06c04b?w=200&q=60' }
        ]
      },
      friends: {
        name: 'С друзьями',
        items: [
          { name: 'Лучшие нишевые бары в центре', detail: '4 места · 5–6 ч', price: 'от 3 600 ₽', img: 'https://images.unsplash.com/photo-1541532713592-79a0317b6b77?w=200&q=60' },
          { name: 'Вечеринка по барам', detail: '3 места · 4–5 ч', price: 'от 2 200 ₽', img: 'https://images.unsplash.com/photo-1530103862676-de8c9debad1d?w=200&q=60' },
          { name: 'Караоке-баттл в центре', detail: '1 место · 3–4 ч', price: 'от 1 800 ₽', img: 'https://images.unsplash.com/photo-1516450360452-9312f5e86fc7?w=200&q=60' }
        ]
      },
      walk: {
        name: 'Прогулка',
        items: [
          { name: 'Трекинг по дубовому лесу', detail: '2 места · 2–3 ч', price: 'от 900 ₽', img: 'https://images.unsplash.com/photo-1501889088093-90b27410d97e?w=200&q=60' },
          { name: 'Велосипедный маршрут по парку', detail: '3 места · 2 ч', price: 'от 600 ₽', img: 'https://images.unsplash.com/photo-1551632811-561732d1e306?w=200&q=60' }
        ]
      },
      birthday: {
        name: 'День рождения',
        items: [
          { name: 'Лофт-вечеринка с DJ', detail: '1 место · 5–6 ч', price: 'от 2 500 ₽', img: 'https://images.unsplash.com/photo-1530103862676-de8c9debad1d?w=200&q=60' }
        ]
      }
    };

    const foldersView = document.getElementById('folders-view');
    const expandedView = document.getElementById('expanded-view');
    const headerFolders = document.getElementById('header-folders');
    const expandedTitle = document.getElementById('expanded-title');
    const savedList = document.getElementById('saved-list');

    // Click folder to expand
    document.querySelectorAll('.folder').forEach(folder => {
      folder.addEventListener('click', (e) => {
        if (e.target.closest('.share-btn')) return;
        const key = folder.dataset.folder;
        const data = folderData[key];
        if (!data) return;

        expandedTitle.textContent = data.name;
        savedList.innerHTML = data.items.map(item => `
          <div class="saved-card">
            <div class="saved-thumb"><image-slot placeholder="" src="${item.img}"></image-slot></div>
            <div class="saved-info">
              <div class="saved-name">${item.name}</div>
              <div class="saved-detail">${item.detail} <span class="dot"></span> ${item.price}</div>
            </div>
            <button class="saved-remove" aria-label="Удалить">
              <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M5 5l6 6M11 5l-6 6" stroke="#6B7280" stroke-width="1.6" stroke-linecap="round"/></svg>
            </button>
          </div>
        `).join('');

        foldersView.style.display = 'none';
        headerFolders.style.display = 'none';
        expandedView.classList.add('show');
      });
    });

    // Back to folders
    document.getElementById('back-to-folders').addEventListener('click', () => {
      foldersView.style.display = '';
      headerFolders.style.display = '';
      expandedView.classList.remove('show');
    });

    // Share buttons — open voting link
    document.querySelectorAll('.share-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const orig = btn.innerHTML;
        btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M3.5 8.5l3 3 6-6.5" stroke="#10B981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>';
        btn.style.background = '#D1FAE5';
        setTimeout(() => {
          btn.innerHTML = orig;
          btn.style.background = '';
        }, 1500);
      });
    });

    // Share expanded folder
    document.getElementById('expanded-share').addEventListener('click', () => {
      const btn = document.getElementById('expanded-share');
      const orig = btn.innerHTML;
      btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M3.5 8.5l3 3 6-6.5" stroke="#10B981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg> Ссылка скопирована';
      btn.style.color = '#10B981';
      setTimeout(() => {
        btn.innerHTML = orig;
        btn.style.color = '';
      }, 2000);
    });

    // Folder tabs
    document.querySelectorAll('.ftab').forEach(t => {
      t.addEventListener('click', () => {
        document.querySelector('.ftab.active')?.classList.remove('active');
        t.classList.add('active');
      });
    });

    // Bottom nav
    document.querySelectorAll('.navtab').forEach(n => {
      n.addEventListener('click', () => {
        document.querySelector('.navtab.active')?.classList.remove('active');
        n.classList.add('active');
      });
    });
  </script>
</body>
</html>
